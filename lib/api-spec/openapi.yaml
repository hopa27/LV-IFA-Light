openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: IFA Lite API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: brokers
    description: Broker/IFA management
  - name: contacts
    description: Contact management
  - name: notes
    description: Notes management
  - name: lookups
    description: Lookup operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /brokers:
    get:
      operationId: listBrokers
      tags: [brokers]
      summary: List all brokers
      parameters:
        - name: postcode
          in: query
          schema:
            type: string
        - name: ifaReference
          in: query
          schema:
            type: string
        - name: ifaName
          in: query
          schema:
            type: string
        - name: authorised
          in: query
          schema:
            type: boolean
        - name: cancelled
          in: query
          schema:
            type: boolean
        - name: duplicateRecord
          in: query
          schema:
            type: boolean
        - name: revoked
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of brokers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broker"
    post:
      operationId: createBroker
      tags: [brokers]
      summary: Create a new broker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBroker"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
  /brokers/{id}:
    get:
      operationId: getBroker
      tags: [brokers]
      summary: Get broker by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "404":
          description: Not found
    put:
      operationId: updateBroker
      tags: [brokers]
      summary: Update a broker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBroker"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
  /brokers/{brokerId}/contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts for a broker
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a new contact
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContact"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
  /brokers/{brokerId}/contacts/{id}:
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContact"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
  /brokers/{brokerId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a broker
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNote"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
  /brokers/{brokerId}/retirement-income:
    get:
      operationId: getRetirementIncome
      tags: [brokers]
      summary: Get retirement income settings
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retirement income settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementIncome"
    put:
      operationId: updateRetirementIncome
      tags: [brokers]
      summary: Update retirement income settings
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetirementIncome"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementIncome"
  /brokers/{brokerId}/equity-release:
    get:
      operationId: getEquityRelease
      tags: [brokers]
      summary: Get equity release settings
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equity release settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquityRelease"
    put:
      operationId: updateEquityRelease
      tags: [brokers]
      summary: Update equity release settings
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquityRelease"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquityRelease"
